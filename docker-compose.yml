services:
  db:
    image: pgvector/pgvector:pg16
    container_name: akiya_db
    environment:
      POSTGRES_USER: akiya
      POSTGRES_PASSWORD: akiya_pass
      POSTGRES_DB: akiya_nav
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U akiya -d akiya_nav"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: akiya_backend
    env_file: .env
    ports:
      - "8080:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  frontend:
    build: ./frontend
    container_name: akiya_frontend
    ports:
      - "8501:8501"
    env_file: .env
    depends_on:
      - backend

volumes:
  pgdata:
